name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ده اللي بيعمل التاج (زي v1.0.0) على الـ commit في main.
      # الـ push بتاع التاج ده هو اللي هيشغّل app-ci.yml من جديد
      # (بعد ما ضفنا "tags: v*.*.*" في on.push هناك)، وساعتها
      # metadata-action هيلاقي التاج ده ويستخدمه كـ tag للـ image.
      - name: Bump Version and Push Tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          generate_release_notes: true