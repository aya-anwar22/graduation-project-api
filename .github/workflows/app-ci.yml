name: App CI

on:
  workflow_dispatch:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      # -------------------------
      # Phase 4 - Lint
      # -------------------------
      - name: Run Lint
        run: npm run lint:ci

      # -------------------------
      # Phase 6 - Dependency Scan
      # -------------------------
      - name: Generate npm Audit Report
        run: |
          npm audit --json > audit-report.json || true

      - name: Upload Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json

      - name: Fail on Critical Vulnerabilities
        run: npm audit --audit-level=critical
        continue-on-error: true
        # مؤقت: شيلي السطر اللي فوق (continue-on-error) بعد ما تصلحي الثغرات
        # الحرجة عن طريق npm audit fix، عشان الفحص يرجع يوقف الـ pipeline فعليًا.

      # -------------------------
      # Phase 7 - Unit Tests + Coverage
      # -------------------------
      - name: Run Unit Tests with Coverage
        run: npm run test:cov

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: coverage/

      # -------------------------
      # Phase 8 - SonarCloud Analysis
      # -------------------------
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # -------------------------
      # Phase 9 - Docker Build
      # -------------------------

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: backend

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: backend:${{ github.sha }}