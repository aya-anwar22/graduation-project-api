name: App CI

on:
  workflow_dispatch:

  push:
    branches:
      - main
    tags:
      - "v*.*.*"

  pull_request:
    branches:
      - main


jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read
      id-token: write
      security-events: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      # -------------------------
      # Phase 4 - Lint
      # -------------------------
      - name: Run Lint
        run: npm run lint:ci

      # -------------------------
      # Phase 6 - Dependency Scan
      # -------------------------
      - name: Generate npm Audit Report
        run: |
          npm audit --json > audit-report.json || true

      - name: Upload Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json

      - name: Fail on Critical Vulnerabilities
        run: npm audit --audit-level=critical
        continue-on-error: true
        # مؤقت: شيلي السطر اللي فوق (continue-on-error) بعد ما تصلحي الثغرات
        # الحرجة عن طريق npm audit fix، عشان الفحص يرجع يوقف الـ pipeline فعليًا.

      # -------------------------
      # Phase 7 - Unit Tests + Coverage
      # -------------------------
      - name: Run Unit Tests with Coverage
        run: npm run test:ci

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: coverage/

      # -------------------------
      # Phase 8 - SonarCloud Analysis
      # -------------------------
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # -------------------------
      # Phase 9 - Docker Build
      # -------------------------

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      # هنا الفكرة الأساسية: metadata-action بيستخرج تلقائيًا رقم
      # الفيرجن (semver) من اسم التاج لما الـ workflow يتشغل بسبب
      # push لتاج زي v1.0.0، وفي نفس الوقت بيحط تاج بالـ commit SHA
      # في كل الحالات (حتى لو مفيش تاج). النتيجة: الـ image بياخد
      # التاجين مع بعض.
      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: backend
          tags: |
            type=raw,value=${{ github.sha }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # -------------------------
      # Phase 10 - SBOM
      # -------------------------

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: |
          syft backend:${{ github.sha }} \
            -o spdx-json=backend-sbom.spdx.json

      - name: Upload Backend SBOM
        uses: actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: backend-sbom.spdx.json

      # -------------------------
      # Phase 11 - Trivy Scan
      # -------------------------

      - name: Scan Docker Image with Trivy
        id: trivy-scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: backend:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      # -------------------------
      # Phase 12 - Upload SARIF
      # -------------------------

      - name: Upload Trivy SARIF Report
        if: always()
        run: test -f trivy-results.sarif
        continue-on-error: true
        id: check-sarif

      - name: Upload Trivy SARIF Report
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Upload Trivy Report Artifact
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: backend-trivy-report
          path: trivy-results.sarif

      # -------------------------
      # Phase 13 - Install Cosign
      # -------------------------

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # -------------------------
      # Phase 14 - Configure AWS
      # -------------------------

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # هنا بنبني قائمة التاجات الكاملة اللي هتتبعت لـ ECR:
      # repo/backend:<sha> و repo/backend:v1.0.0 (لو الترigger كان تاج)
      # و repo/backend:1.0 و repo/backend:latest (لو على main).
      - name: Build ECR Tags
        id: ecr-tags
        run: |
          TAGS=""
          for t in $(echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | cut -d: -f2); do
            TAGS+="${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${t},"
          done
          echo "tags=${TAGS%,}" >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker Image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.ecr-tags.outputs.tags }}

      - name: Sign Docker Image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Verify Docker Image Signature
        run: |
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/app-ci.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}